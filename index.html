<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="eL Vision Group Ecosystem" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Meta Tags to Prevent WhatsApp Image Preview -->
    <meta property="og:title" content="eL Vision AI" />
    <meta property="og:description" content="eL Vision Group Ecosystem" />
    <meta property="og:type" content="website" />
    <!-- By providing an empty image or a very small transparent pixel, WhatsApp usually skips the image preview -->
    <meta property="og:image" content="" />
    <meta name="twitter:card" content="summary" />

    <title>eL Vision AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
      href="https://fonts.googleapis.com/css2?family=Exo:ital,wght@0,100..900;1,100..900&display=swap" 
      rel="stylesheet" 
      media="print" 
      onload="this.media='all'"
    >
    <link 
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" 
      rel="stylesheet" 
      media="print" 
      onload="this.media='all'"
    >
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Exo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    </noscript>

    <!-- Console Log Suppression (Executed before other scripts) -->
    <script>
      (function() {
        var originalLog = console.log;
        var originalWarn = console.warn;
        var originalInfo = console.info;
        var originalError = console.error;
        var originalDebug = console.debug;

        var suppressPatterns = [
          'Download the React DevTools',
          '🔗 Supabase connecting to',
          "You are sending a non-standard event 'TimeSpent'",
          'TimeSpent'
        ];

        function shouldSuppress(args) {
          for (var i = 0; i < args.length; i++) {
            var arg = args[i];
            if (typeof arg === 'string') {
              for (var j = 0; j < suppressPatterns.length; j++) {
                if (arg.indexOf(suppressPatterns[j]) !== -1) return true;
              }
            }
          }
          return false;
        }

        console.log = function() {
          if (!shouldSuppress(arguments)) originalLog.apply(console, arguments);
        };
        console.warn = function() {
          if (!shouldSuppress(arguments)) originalWarn.apply(console, arguments);
        };
        console.info = function() {
          if (!shouldSuppress(arguments)) originalInfo.apply(console, arguments);
        };
        console.error = function() {
          if (!shouldSuppress(arguments)) originalError.apply(console, arguments);
        };
        console.debug = function() {
          if (!shouldSuppress(arguments)) originalDebug.apply(console, arguments);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
